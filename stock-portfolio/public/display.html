<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>持仓看板</title>
    <link rel="stylesheet" href="./display.css" />
  </head>
  <body>
    <main class="display-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">BYTEDARICE PORTFOLIO</p>
          <h1>持仓看板</h1>
        </div>
        <div class="topbar-actions">
          <div class="market-meta" aria-live="polite">
            <span id="quoteSource">行情源：--</span>
            <span id="quoteTime">行情时间：--</span>
            <span id="refreshTime">刷新时间：--</span>
          </div>
          <button id="refreshButton" class="refresh-button" type="button">刷新价格</button>
        </div>
      </header>

      <section class="summary-grid" aria-label="持仓汇总">
        <article class="summary-tile total-value">
          <span>最新市值</span>
          <strong id="totalMarketValue">--</strong>
          <small id="positionCount">--</small>
        </article>
        <article class="summary-tile">
          <span>今日盈亏</span>
          <strong id="todayProfit">--</strong>
          <small>基于昨收</small>
        </article>
        <article class="summary-tile">
          <span>总盈亏</span>
          <strong id="totalProfit">--</strong>
          <small id="totalCost">总成本：--</small>
        </article>
        <article class="summary-tile">
          <span>总收益率</span>
          <strong id="totalReturn">--</strong>
          <small id="quoteStatus">--</small>
        </article>
      </section>

      <section class="positions-panel" aria-label="持仓明细">
        <div class="panel-heading">
          <div>
            <h2>持仓明细</h2>
            <p id="statusText">正在读取持仓...</p>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>代码</th>
                <th>名称</th>
                <th>数量</th>
                <th>成本价</th>
                <th>昨收</th>
                <th>现价</th>
                <th>市值</th>
                <th>今日盈亏</th>
                <th>总盈亏</th>
                <th>收益率</th>
                <th>行情时间</th>
              </tr>
            </thead>
            <tbody id="positionsBody"></tbody>
          </table>
        </div>
        <div id="mobilePositions" class="mobile-positions"></div>
        <div id="emptyState" class="empty-state">暂无持仓</div>
      </section>
    </main>

    <script type="module" src="./display.js"></script>
  </body>
</html>
